<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Want App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: #050505;
  color: white;
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* LUCE */
.light {
  position: fixed;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(255,110,196,0.8), transparent 70%);
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 1;
  mix-blend-mode: screen;
}

/* CONTAINER */
.container {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transform-style: preserve-3d;
  position: relative;
  z-index: 2;
}

/* TITOLO */
h1 {
  font-size: 4.5rem;
  font-weight: 800;
  background: linear-gradient(90deg, #ff6ec4, #7873f5, #42e695);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 40px rgba(255,110,196,0.2);
}

/* TESTO */
.dynamic-text {
  margin-top: 25px;
  font-size: 1.4rem;
  font-weight: 600;
  height: 40px;
}

.dynamic-text span {
  border-right: 2px solid rgba(255,255,255,0.7);
  padding-right: 5px;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* BTN */
.btn {
  margin-top: 40px;
  padding: 15px 45px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: linear-gradient(90deg, #ff6ec4, #7873f5);
  box-shadow: 0 0 40px rgba(255,110,196,0.6);
}

</style>
</head>

<body>

<canvas id="aurora"></canvas>
<div class="light" id="light"></div>

<div class="container">
  <h1>I Want App</h1>
  <div class="dynamic-text" id="dynamicText"></div>
  <button class="btn">Scarica ora</button>
</div>

<script>
// ===== CANVAS =====
const canvas = document.getElementById("aurora");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ===== NOISE (pseudo perlin) =====
function noise(x) {
  return Math.sin(x * 0.01) * Math.sin(x * 0.013 + 1000);
}

let t = 0;

// ===== AURORA ORGANICA =====
function draw() {
  ctx.clearRect(0, 0, w, h);

  for (let layer = 0; layer < 5; layer++) {
    ctx.beginPath();

    let blur = layer * 20;
    ctx.filter = `blur(${blur}px)`; // profondità

    for (let x = 0; x < w; x += 3) {
      let n =
        noise(x + t * 200 + layer * 100) * 120 +
        noise(x * 0.5 + t * 300) * 60;

      let y = h / 2 + n;

      ctx.lineTo(x, y);
    }

    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();

    let g = ctx.createLinearGradient(0, 0, 0, h);

    if (layer === 0) g.addColorStop(0, "rgba(120,115,245,0.25)");
    if (layer === 1) g.addColorStop(0, "rgba(255,110,196,0.2)");
    if (layer === 2) g.addColorStop(0, "rgba(66,230,149,0.2)");
    if (layer === 3) g.addColorStop(0, "rgba(255,255,255,0.08)");
    if (layer === 4) g.addColorStop(0, "rgba(120,200,255,0.1)");

    g.addColorStop(1, "transparent");

    ctx.fillStyle = g;
    ctx.fill();
  }

  ctx.filter = "none";

  t += 0.002; // movimento lento = premium
  requestAnimationFrame(draw);
}

draw();

// ===== LUCE MOUSE =====
const light = document.getElementById("light");
document.addEventListener("mousemove", e => {
  light.style.left = e.clientX + "px";
  light.style.top = e.clientY + "px";
});

// ===== TESTO =====
const texts = [
  "Quella che userai ogni giorno",
  "Velocissima",
  "Spacca davvero",
  "Non è un'app qualsiasi"
];

let i = 0, j = 0, del = false;
const el = document.getElementById("dynamicText");

function type() {
  let txt = texts[i];

  el.innerHTML = "<span>" + txt.substring(0, j) + "</span>";

  if (!del && j++ === txt.length) {
    del = true;
    setTimeout(type, 1200);
    return;
  }

  if (del && j-- === 0) {
    del = false;
    i = (i + 1) % texts.length;
  }

  setTimeout(type, del ? 40 : 70);
}

type();
</script>

</body>
</html>
