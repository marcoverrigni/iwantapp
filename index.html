<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super App 3D</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  overflow: hidden;
  background: #000;
  color: white;
}

/* UI */
.ui {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  pointer-events: none;
  text-align: center;
}

h1 {
  font-size: 3.5rem;
  font-weight: 800;
  background: linear-gradient(90deg, #ff6ec4, #7873f5, #42e695);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.btn {
  margin-top: 30px;
  padding: 15px 40px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(90deg, #ff6ec4, #7873f5);
  color: white;
  font-weight: 600;
  cursor: pointer;
  pointer-events: auto;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.15);
  box-shadow: 0 0 30px #ff6ec4;
}
</style>
</head>

<body>

<div class="ui">
  <h1>I want app</h1>
  <button class="btn">Scarica ora</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// SCENA
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 6;

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LUCI
const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(5, 5, 5);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));

// 📱 TELEFONO (gruppo)
const phone = new THREE.Group();
scene.add(phone);

// CORPO
const bodyGeo = new THREE.BoxGeometry(2.5, 5, 0.3);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
phone.add(body);

// SCHERMO
const screenGeo = new THREE.BoxGeometry(2.2, 4.5, 0.05);
const screenMat = new THREE.MeshStandardMaterial({
  color: 0x000000,
  emissive: 0x222244
});
const screen = new THREE.Mesh(screenGeo, screenMat);
screen.position.z = 0.18;
phone.add(screen);

// CONTENUTO SCHERMO (glow)
const screenGlowGeo = new THREE.PlaneGeometry(2, 4.2);
const screenGlowMat = new THREE.MeshBasicMaterial({
  color: 0xff6ec4
});
const glow = new THREE.Mesh(screenGlowGeo, screenGlowMat);
glow.position.z = 0.21;
phone.add(glow);

// MOUSE
let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5);
  mouseY = (e.clientY / window.innerHeight - 0.5);
});

// ANIMAZIONE
function animate() {
  requestAnimationFrame(animate);

  // floating
  phone.rotation.y += 0.005;
  phone.rotation.x = mouseY * 0.5;
  phone.rotation.y += mouseX * 0.5;

  // effetto fluttuante
  phone.position.y = Math.sin(Date.now() * 0.002) * 0.3;

  renderer.render(scene, camera);
}

animate();

// RESIZE
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
