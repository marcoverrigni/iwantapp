<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Want App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: #050505;
  color: white;
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* LUCE MOUSE */
.light {
  position: fixed;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(255,110,196,0.9), transparent 70%);
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 1;
  mix-blend-mode: screen;
}

/* CONTAINER */
.container {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transform-style: preserve-3d;
  transition: transform 0.08s ease-out;
  position: relative;
  z-index: 2;
}

/* TITOLO */
h1 {
  font-size: 4.5rem;
  font-weight: 800;
  background: linear-gradient(90deg, #ff6ec4, #7873f5, #42e695);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  transform: translateZ(80px);
  letter-spacing: 2px;
  transition: text-shadow 0.2s ease;
}

/* TESTO DINAMICO */
.dynamic-text {
  margin-top: 25px;
  font-size: 1.4rem;
  font-weight: 600;
  height: 40px;
  transform: translateZ(50px);
}

.dynamic-text span {
  background: linear-gradient(90deg, #ff6ec4, #7873f5, #42e695);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  border-right: 2px solid rgba(255,255,255,0.7);
  padding-right: 5px;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  0%, 50%, 100% { border-color: rgba(255,255,255,0.7); }
  25%, 75% { border-color: transparent; }
}

/* BOTTONE */
.btn {
  margin-top: 40px;
  padding: 15px 45px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.2);
  font-weight: 600;
  cursor: pointer;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  color: white;
  transform: translateZ(100px);
  transition: 0.3s;
}

.btn:hover {
  transform: translateZ(120px) scale(1.1);
  background: linear-gradient(90deg, #ff6ec4, #7873f5);
  box-shadow: 0 0 40px rgba(255,110,196,0.6);
}

</style>
</head>

<body>

<canvas id="aurora"></canvas>

<div class="light" id="light"></div>

<div class="container" id="container">
  <h1 id="title">I Want App</h1>
  <div class="dynamic-text" id="dynamicText"></div>
  <button class="btn">Scarica ora</button>
</div>

<script>
// CANVAS AURORA PRO
const canvas = document.getElementById("aurora");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let time = 0;
let mouseX = w / 2;
let mouseY = h / 2;

document.addEventListener("mousemove", e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function drawAurora() {
  ctx.clearRect(0, 0, w, h);

  for (let i = 0; i < 4; i++) {
    ctx.beginPath();

    for (let x = 0; x < w; x += 4) {
      let wave =
        Math.sin(x * 0.002 + time + i) * 60 +
        Math.sin(x * 0.004 + time * 1.5) * 30;

      // effetto magnetico verso il mouse
      let dist = Math.abs(x - mouseX);
      let influence = Math.max(0, 150 - dist) / 150;

      let y = h / 2 + wave - influence * 120;

      ctx.lineTo(x, y);
    }

    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();

    let gradient = ctx.createLinearGradient(0, 0, 0, h);

    if (i === 0) {
      gradient.addColorStop(0, "rgba(120,115,245,0.35)");
      gradient.addColorStop(1, "transparent");
    } else if (i === 1) {
      gradient.addColorStop(0, "rgba(255,110,196,0.3)");
      gradient.addColorStop(1, "transparent");
    } else if (i === 2) {
      gradient.addColorStop(0, "rgba(66,230,149,0.3)");
      gradient.addColorStop(1, "transparent");
    } else {
      gradient.addColorStop(0, "rgba(255,255,255,0.15)");
      gradient.addColorStop(1, "transparent");
    }

    ctx.fillStyle = gradient;
    ctx.fill();
  }

  time += 0.008;
  requestAnimationFrame(drawAurora);
}

drawAurora();

// LUCE FOLLOW
const light = document.getElementById("light");
const title = document.getElementById("title");

document.addEventListener("mousemove", e => {
  light.style.left = e.clientX + "px";
  light.style.top = e.clientY + "px";

  // glow dinamico sul titolo
  let dx = e.clientX - window.innerWidth / 2;
  let dy = e.clientY - window.innerHeight / 2;

  title.style.textShadow = `
    ${dx * 0.02}px ${dy * 0.02}px 30px rgba(255,110,196,0.4),
    ${-dx * 0.02}px ${-dy * 0.02}px 30px rgba(120,115,245,0.4)
  `;
});

// PARALLAX 3D
const container = document.getElementById("container");
document.addEventListener("mousemove", e => {
  let x = (window.innerWidth / 2 - e.clientX) / 30;
  let y = (window.innerHeight / 2 - e.clientY) / 30;
  container.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

// TESTO DINAMICO
const texts = [
  "Quella che userai ogni giorno ",
  "Velocissima ",
  "Spacca davvero ",
  "Non è un'app qualsiasi "
];

let i = 0;
let j = 0;
let currentText = "";
let isDeleting = false;

const dynamicText = document.getElementById("dynamicText");

function typeEffect() {
  currentText = texts[i];

  if (!isDeleting) {
    dynamicText.innerHTML = "<span>" + currentText.substring(0, j++) + "</span>";
  } else {
    dynamicText.innerHTML = "<span>" + currentText.substring(0, j--) + "</span>";
  }

  if (!isDeleting && j === currentText.length) {
    isDeleting = true;
    setTimeout(typeEffect, 1200);
    return;
  }

  if (isDeleting && j === 0) {
    isDeleting = false;
    i = (i + 1) % texts.length;
  }

  setTimeout(typeEffect, isDeleting ? 40 : 70);
}

typeEffect();
</script>

</body>
</html>
