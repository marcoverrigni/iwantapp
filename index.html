<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - I Want App Super Figa</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: linear-gradient(-45deg, #ff6ec4, #7873f5, #42e695, #f9f871);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      overflow: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: 4rem;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #ff6ec4, 0 0 30px #ff6ec4, 0 0 40px #ff6ec4;
      animation: neon 1.5s ease-in-out infinite alternate;
      margin-bottom: 50px;
      text-align: center;
    }

    @keyframes neon {
      from {
        text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #ff6ec4, 0 0 30px #ff6ec4, 0 0 40px #ff6ec4;
      }
      to {
        text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff6ec4, 0 0 40px #ff6ec4, 0 0 50px #ff6ec4;
      }
    }

    .download-btn {
      padding: 15px 35px;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      border: 2px solid #fff;
      border-radius: 50px;
      background: transparent;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px #fff, 0 0 20px #ff6ec4;
      animation: btnPulse 2s infinite;
    }

    .download-btn:hover {
      background: #ff6ec4;
      box-shadow: 0 0 20px #ff6ec4, 0 0 40px #ff6ec4;
      transform: scale(1.1);
    }

    @keyframes btnPulse {
      0% { box-shadow: 0 0 10px #fff, 0 0 20px #ff6ec4; }
      50% { box-shadow: 0 0 20px #fff, 0 0 40px #ff6ec4; }
      100% { box-shadow: 0 0 10px #fff, 0 0 20px #ff6ec4; }
    }

  </style>
</head>
<body>
  <h1>I Want App</h1>
  <button class="download-btn">Scarica l'app</button>
</body>
</html>
