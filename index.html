<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
  overflow-x: hidden;
}

/* CURSORE GLOW */
.cursor {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: radial-gradient(circle, #ff6ec4, transparent);
  position: fixed;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 999;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
}

h1 {
  font-size: 4rem;
  font-weight: 800;
  background: linear-gradient(90deg, #ff6ec4, #7873f5, #42e695);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: fadeUp 1.5s ease forwards;
}

p {
  margin-top: 20px;
  opacity: 0.7;
  animation: fadeUp 2s ease forwards;
}

/* BOTTONI */
.btn {
  margin-top: 40px;
  padding: 15px 40px;
  border-radius: 50px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  background: linear-gradient(90deg, #ff6ec4, #7873f5);
  color: white;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.2);
  box-shadow: 0 0 30px #ff6ec4;
}

/* PARTICELLE */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* FEATURES */
.features {
  padding: 100px 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 0 30px rgba(255,255,255,0.2);
}

/* ANIMAZIONI */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>

<section class="hero">
  <h1>I want app</h1>
  <p>L'app 🚀</p>
  <button class="btn">Scarica ora</button>
</section>

<section class="features">
  <div class="card">⚡ Velocissima</div>
  <div class="card">🎨 Design assurdo</div>
  <div class="card">🤖 Smart AI</div>
  <div class="card">🌍 Globale</div>
</section>

<script>
// CURSORE
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

// PARTICELLE INTERATTIVE
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: Math.random() - 0.5,
    vy: Math.random() - 0.5
  });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();

    // connessioni
    particles.forEach(p2 => {
      let dx = p.x - p2.x;
      let dy = p.y - p2.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 100) {
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
    });
  });

  requestAnimationFrame(animate);
}

animate();

// RESIZE
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
