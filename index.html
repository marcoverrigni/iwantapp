<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Want App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at center, #0a0a0a, #050505);
  color: white;
}

/* LUCE MOUSE */
.light {
  position: fixed;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255,110,196,0.15), transparent 70%);
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 0;
}

/* CONTAINER */
.container {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transform-style: preserve-3d;
  transition: transform 0.08s ease-out;
  position: relative;
  z-index: 1;
}

/* TITOLO */
h1 {
  font-size: 4.5rem;
  font-weight: 800;
  background: linear-gradient(90deg, #ff6ec4, #7873f5, #42e695);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  transform: translateZ(80px);
  letter-spacing: 2px;
}

/* TESTO DINAMICO */
.dynamic-text {
  margin-top: 25px;
  font-size: 1.4rem;
  font-weight: 600;
  height: 40px;
  transform: translateZ(50px);
}

.dynamic-text span {
  background: linear-gradient(90deg, #ff6ec4, #7873f5, #42e695);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  border-right: 2px solid rgba(255,255,255,0.7);
  padding-right: 5px;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  0%, 50%, 100% { border-color: rgba(255,255,255,0.7); }
  25%, 75% { border-color: transparent; }
}

/* BOTTONE */
.btn {
  margin-top: 40px;
  padding: 15px 45px;
  border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.2);
  font-weight: 600;
  cursor: pointer;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  color: white;
  transform: translateZ(100px);
  transition: 0.3s;
}

.btn:hover {
  transform: translateZ(120px) scale(1.1);
  background: linear-gradient(90deg, #ff6ec4, #7873f5);
  box-shadow: 0 0 40px rgba(255,110,196,0.6);
}

</style>
</head>

<body>

<div class="light" id="light"></div>

<div class="container" id="container">
  <h1>I Want App</h1>
  <div class="dynamic-text" id="dynamicText"></div>
  <button class="btn">Scarica ora</button>
</div>

<script>
// LUCE FOLLOW
const light = document.getElementById("light");
document.addEventListener("mousemove", e => {
  light.style.left = e.clientX + "px";
  light.style.top = e.clientY + "px";
});

// PARALLAX 3D
const container = document.getElementById("container");
document.addEventListener("mousemove", e => {
  let x = (window.innerWidth / 2 - e.clientX) / 30;
  let y = (window.innerHeight / 2 - e.clientY) / 30;
  container.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

// TESTO DINAMICO FIGO (typing)
const texts = [
  "Quella che userai ogni giorno ",
  "Velocissima ",
  "Spacca davvero ",
  "Non è un'app qualsiasi"
];

let i = 0;
let j = 0;
let currentText = "";
let isDeleting = false;

const dynamicText = document.getElementById("dynamicText");

function typeEffect() {
  currentText = texts[i];

  if (!isDeleting) {
    dynamicText.innerHTML = "<span>" + currentText.substring(0, j++) + "</span>";
  } else {
    dynamicText.innerHTML = "<span>" + currentText.substring(0, j--) + "</span>";
  }

  if (!isDeleting && j === currentText.length) {
    isDeleting = true;
    setTimeout(typeEffect, 1200);
    return;
  }

  if (isDeleting && j === 0) {
    isDeleting = false;
    i = (i + 1) % texts.length;
  }

  setTimeout(typeEffect, isDeleting ? 40 : 70);
}

typeEffect();
</script>

</body>
</html>
